<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리드인사이트 - 문해력 챌린지</title>
    <style>
        :root {
            --primary: #58cc02; /* 듀오링고 그린 */
            --primary-dark: #46a302;
            --text: #4b4b4b;
            --bg: #ffffff;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #app-container {
            width: 360px;
            height: 640px;
            border: 2px solid #e5e5e5;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        /* 상단 프로그레스바 */
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .progress-bar {
            flex-grow: 1;
            height: 16px;
            background: #e5e5e5;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 40%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }
        /* 캐릭터 가이드 영역 */
        .character-zone {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 30px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: #eee;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }
        .speech-bubble {
            background: #fff;
            border: 2px solid #e5e5e5;
            padding: 12px;
            border-radius: 15px;
            position: relative;
            font-size: 15px;
            font-weight: 600;
        }
        /* 퀴즈 영역 */
        .question-box { margin-bottom: 20px; }
        .passage {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary);
        }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 15px;
            border: 2px solid #e5e5e5;
            border-bottom: 4px solid #e5e5e5;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.1s;
        }
        .option-btn:active { transform: translateY(2px); border-bottom-width: 2px; }
        .option-btn:hover { background: #f1f1f1; border-color: #cecece; }
        
        /* 하단 체크 버튼 */
        .footer {
            margin-top: auto;
            padding-bottom: 20px;
        }
        .check-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 5px solid var(--primary-dark);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <span>✕</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <span>❤️ 5</span>
    </div>

    <div class="character-zone">
        <div class="avatar">🤖</div> <div class="speech-bubble">
            안녕! 나는 '아로'야.<br>지문을 읽고 안드로이드의<br>진짜 의도를 맞춰봐!
        </div>
    </div>

    <div class="question-box">
        <div class="passage">
            "안드로이드는 무거운 쇼핑백을 들고 있었지만, 그의 센서는 피로를 느끼지 않았다. 다만 그는 주인이 남긴 <strong>'가벼운 마음으로 와'</strong>라는 메시지의 의미를 해석하느라 처리 속도가 늦어지고 있었다."
        </div>
        <p style="font-weight: bold;">위 지문에서 안드로이드가 현재 겪고 있는 문제는?</p>
        <div class="options">
            <button class="option-btn">1. 배터리가 부족하여 움직임이 느려짐</button>
            <button class="option-btn">2. 쇼핑백이 너무 무거워 고장이 남</button>
            <button class="option-btn" style="border-color: var(--primary); background: #e8f5e9;">3. 관용적 표현의 맥락을 이해하지 못함</button>
            <button class="option-btn">4. 주인의 메시지를 수신하지 못함</button>
        </div>
    </div>

    <div class="footer">
        <button class="check-btn" onclick="alert('정답입니다! 문해력 경험치 +10')">확인하기</button>
    </div>
</div>

</body>
</html>
