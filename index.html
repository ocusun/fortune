<style>
  :root {
    --bg: #F5F1E6;
    --bg-card: #FFFEF9;
    --ink: #2C2A24;
    --ink-soft: #6B655C;
    --ink-faint: #A39E94;
    --line: #E5DFD0;
    --gold: #B8860B;
    --seal: #B23A48;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 760px; margin: 0 auto; padding: 48px 24px 64px; }
  .header { text-align: center; margin-bottom: 36px; }
  .title {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px; font-weight: 500;
    letter-spacing: 0.15em; margin-bottom: 8px;
  }
  .title-mark {
    display: inline-block; width: 32px; height: 1px;
    background: var(--ink-faint); margin: 0 12px; vertical-align: middle;
  }
  .date { font-size: 14px; color: var(--ink-soft); letter-spacing: 0.05em; }
  .prompt {
    text-align: center; font-family: 'Noto Serif KR', serif;
    font-size: 15px; color: var(--ink-soft);
    margin-bottom: 28px; letter-spacing: 0.02em;
  }
  .reshuffle { text-align: center; margin-bottom: 24px; }
  .reshuffle-btn {
    background: transparent; border: none; font-family: inherit;
    font-size: 12px; color: var(--ink-faint); cursor: pointer;
    padding: 4px 10px; letter-spacing: 0.1em; transition: color 0.2s;
  }
  .reshuffle-btn:hover { color: var(--ink-soft); }
  .reshuffle-btn::before { content: '↻ '; margin-right: 2px; }
  .cards {
    display: flex; justify-content: center; gap: 14px;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .card {
    width: 130px; height: 180px;
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 4px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s, box-shadow 0.3s, border-color 0.3s;
    position: relative; box-shadow: 0 1px 3px rgba(60, 50, 30, 0.04);
  }
  .card::before {
    content: ''; position: absolute; inset: 6px;
    border: 0.5px solid var(--line); border-radius: 2px; pointer-events: none;
  }
  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 6px 20px rgba(60, 50, 30, 0.08);
    border-color: var(--ink-faint);
  }
  .card.faded { opacity: 0.15; pointer-events: none; }
  .card.picked {
    transform: translateY(-8px);
    box-shadow: 0 8px 24px rgba(60, 50, 30, 0.12);
    border-color: var(--ink-soft);
  }
  .hanja {
    font-family: 'Noto Serif KR', serif;
    font-size: 56px; font-weight: 500; line-height: 1; margin-bottom: 12px;
  }
  .label { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.1em; text-align: center; }
  .label .ko { display: block; font-size: 12px; margin-bottom: 2px; }
  .label .en { display: block; font-size: 11px; color: var(--ink-faint); }
  .result { opacity: 0; max-height: 0; overflow: hidden; transition: opacity 0.6s ease, max-height 0.6s ease; }
  .result.show { opacity: 1; max-height: 2500px; margin-top: 24px; }
  .result-inner {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 4px; padding: 36px 28px 24px; position: relative;
  }
  .result-inner::before {
    content: ''; position: absolute; inset: 8px;
    border: 0.5px solid var(--line); border-radius: 2px; pointer-events: none;
  }
  .picked-name {
    text-align: center; font-family: 'Noto Serif KR', serif;
    font-size: 13px; color: var(--ink-faint);
    letter-spacing: 0.15em; margin-bottom: 18px;
  }
  .picked-name .ch { font-size: 18px; margin-right: 6px; }
  .picked-name .domain {
    display: block; margin-top: 6px; font-size: 11px;
    color: var(--ink-faint); letter-spacing: 0.2em;
  }
  .score-block { text-align: center; margin-bottom: 20px; }
  .score-num { font-family: 'Noto Serif KR', serif; font-size: 52px; font-weight: 500; line-height: 1; }
  .score-suffix { font-size: 14px; color: var(--ink-soft); margin-left: 4px; }
  .stars { margin-top: 8px; font-size: 18px; color: var(--gold); letter-spacing: 6px; }
  .tier {
    display: inline-block; margin-top: 10px;
    padding: 3px 12px; border: 0.5px solid var(--line); border-radius: 999px;
    font-size: 11px; color: var(--ink-soft); letter-spacing: 0.15em;
  }
  .summary {
    font-family: 'Noto Serif KR', serif; text-align: center;
    font-size: 16px; line-height: 1.85; margin: 22px 12px 28px; color: var(--ink);
  }
  .summary::before, .summary::after {
    content: '"'; color: var(--ink-faint); font-size: 22px; margin: 0 4px;
  }
  .fields {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .field {
    padding: 14px; border: 0.5px solid var(--line);
    border-radius: 3px; background: rgba(0, 0, 0, 0.01);
  }
  .field-title {
    font-family: 'Noto Serif KR', serif; font-size: 12px;
    color: var(--ink-faint); letter-spacing: 0.15em; margin-bottom: 8px;
  }
  .field-text { font-size: 13.5px; line-height: 1.7; color: var(--ink); }
  .lucky {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px; margin-bottom: 20px; padding: 14px 10px;
    background: rgba(184, 134, 11, 0.05); border-radius: 3px;
  }
  .lucky-item { text-align: center; }
  .lucky-label { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.1em; margin-bottom: 4px; }
  .lucky-val { font-size: 14px; font-weight: 500; color: var(--ink); }
  .proverb {
    text-align: center; font-family: 'Noto Serif KR', serif;
    font-size: 15px; color: var(--ink-soft);
    padding: 20px 12px 0; border-top: 0.5px solid var(--line); line-height: 1.7;
  }
  .proverb-mark {
    display: block; font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.2em; margin-bottom: 8px;
  }
  .actions { display: flex; justify-content: center; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
  .btn {
    padding: 9px 22px; background: transparent; border: 0.5px solid var(--ink-soft);
    border-radius: 3px; color: var(--ink); font-family: inherit;
    font-size: 13px; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { background: var(--ink); color: var(--bg-card); }
  .btn.subtle { border-color: var(--line); color: var(--ink-soft); }
  .btn.subtle:hover { background: var(--ink-soft); color: var(--bg-card); }

  /* Share section */
  .share {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 0.5px dashed var(--line);
    text-align: center;
  }
  .share-label {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    margin-bottom: 12px;
  }
  .share-buttons {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .share-btn {
    background: transparent;
    border: 0.5px solid var(--line);
    border-radius: 999px;
    padding: 7px 16px;
    font-family: inherit;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .share-btn:hover {
    background: var(--bg-card);
    border-color: var(--ink-faint);
    color: var(--ink);
  }
  .share-btn.copied {
    background: var(--ink);
    color: var(--bg-card);
    border-color: var(--ink);
  }
  .share-btn svg { width: 13px; height: 13px; }

  .footer {
    text-align: center; margin-top: 40px; font-size: 11px;
    color: var(--ink-faint); letter-spacing: 0.15em;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--ink);
    color: var(--bg-card);
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 540px) {
    .page { padding: 32px 16px 48px; }
    .title { font-size: 22px; }
    .card { width: calc(50% - 6px); height: 150px; max-width: 150px; }
    .hanja { font-size: 48px; margin-bottom: 8px; }
    .cards { gap: 10px; }
    .summary { font-size: 15px; margin: 18px 4px 22px; }
    .score-num { font-size: 42px; }
    .result-inner { padding: 28px 18px 20px; }
    .fields { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="toast" id="toast">링크가 복사되었습니다</div>

<div class="page">

    <h1 class="title"><span class="title-mark"></span>오늘의 운세<span class="title-mark"></span></h1>

  <div class="footer">天地人日月風水火 · 八卦 운세</div>
</div>

const COLORS_POOL = [
  '빨강','주황','노랑','초록','파랑','남색','보라','흰색','분홍','황금','은빛','하늘색',
  '갈색','군청색','산호색','살구색','옥색','자주색'
];
const DIRS_POOL = ['동쪽','서쪽','남쪽','북쪽','동남쪽','서남쪽','동북쪽','서북쪽'];

const days = ['일','월','화','수','목','금','토'];
const today = new Date();
document.getElementById('date').textContent =
  `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 ${days[today.getDay()]}요일`;

let currentCards = [];
let currentPicked = null;
let currentResult = null;

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function shuffleAndPick(n) {
  const keys = Object.keys(CARDS);
  for (let i = keys.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [keys[i], keys[j]] = [keys[j], keys[i]];
  }
  return keys.slice(0, n);
}

function stars(score) {
  if (score >= 90) return '★★★★★';
  if (score >= 80) return '★★★★☆';
  if (score >= 70) return '★★★☆☆';
  if (score >= 60) return '★★☆☆☆';
  return '★☆☆☆☆';
}
function tierName(score) {
  if (score >= 90) return '대길';
  if (score >= 80) return '길';
  if (score >= 70) return '소길';
  if (score >= 60) return '평';
  return '소소';
}

function generate(key) {
  const c = CARDS[key];
  const [lo, hi] = c.range;
  const score = lo + Math.floor(Math.random() * (hi - lo + 1));
  const fields = c.fields.map(f => ({ label: f.label, text: pick(f.pool) }));
  const result = {
    score,
    summary: fields[0].text,
    fields,
    proverb: pick(c.proverbs)
  };
  if (c.lucky) {
    result.lucky = {
      color: pick(COLORS_POOL),
      number: 1 + Math.floor(Math.random() * 9),
      dir: pick(DIRS_POOL)
    };
  }
  return result;
}

function renderCards() {
  const wrap = document.getElementById('cards');
  wrap.innerHTML = '';
  currentCards.forEach((key) => {
    const c = CARDS[key];
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.key = key;
    div.innerHTML = `
      <div class="hanja" style="color:${c.color}">${c.hanja}</div>
      <div class="label">
        <span class="ko">${c.name}</span>
        <span class="en">${c.domain}</span>
      </div>
    `;
    div.addEventListener('click', () => pickCard(key));
    wrap.appendChild(div);
  });
}

function shuffleAndRender() {
  currentCards = shuffleAndPick(4);
  currentPicked = null;
  currentResult = null;
  renderCards();
  document.getElementById('result').classList.remove('show');
}

function pickCard(key) {
  currentPicked = key;
  document.querySelectorAll('.card').forEach(c => {
    if (c.dataset.key === key) c.classList.add('picked');
    else c.classList.add('faded');
  });
  showResult(key);
}

function rerollCurrent() {
  if (!currentPicked) return;
  showResult(currentPicked);
}

function showResult(key) {
  const c = CARDS[key];
  const r = generate(key);
  currentResult = { card: c, result: r };

  document.getElementById('pickedName').innerHTML =
    `<span class="ch" style="color:${c.color}">${c.hanja}</span>${c.name}<span class="domain">${c.domain}</span>`;
  document.getElementById('scoreNum').textContent = r.score;
  document.getElementById('stars').textContent = stars(r.score);
  document.getElementById('tier').textContent = tierName(r.score);
  document.getElementById('summary').textContent = r.summary;

  const fieldsWrap = document.getElementById('fields');
  fieldsWrap.innerHTML = r.fields.slice(1).map(f => `
    <div class="field">
      <div class="field-title">${f.label}</div>
      <div class="field-text">${f.text}</div>
    </div>
  `).join('');

  const luckyWrap = document.getElementById('luckyBlock');
  if (r.lucky) {
    luckyWrap.style.display = '';
    luckyWrap.innerHTML = `
      <div class="lucky-item"><div class="lucky-label">행운의 색</div><div class="lucky-val">${r.lucky.color}</div></div>
      <div class="lucky-item"><div class="lucky-label">행운의 숫자</div><div class="lucky-val">${r.lucky.number}</div></div>
      <div class="lucky-item"><div class="lucky-label">행운의 방향</div><div class="lucky-val">${r.lucky.dir}</div></div>
    `;
  } else {
    luckyWrap.style.display = 'none';
  }

  document.getElementById('proverbText').textContent = r.proverb;

  const result = document.getElementById('result');
  result.classList.add('show');
  setTimeout(() => result.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
}

function resetAll() {
  shuffleAndRender();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// === Sharing ===
function buildShareText() {
  if (currentResult) {
    const { card, result } = currentResult;
    return `오늘의 운세 — ${card.hanja} ${card.name} · ${result.score}점 (${tierName(result.score)})\n"${result.summary}"`;
  }
  return '오늘의 운세 — 마음 가는 카드 한 장을 골라보세요';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function nativeShare() {
  const url = location.href;
  const text = buildShareText();
  if (navigator.share) {
    try {
      await navigator.share({
        title: '오늘의 운세',
        text: text,
        url: url
      });
    } catch (e) {
      // user cancelled — silent
    }
  } else {
    // desktop fallback: copy to clipboard
    copyLink(document.getElementById('shareCopy'));
  }
}

async function copyLink(btn) {
  const url = location.href;
  const text = `${buildShareText()}\n${url}`;
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 복사됨';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = orig;
    }, 1800);
    showToast('링크가 복사되었습니다');
  } catch (e) {
    // Fallback: prompt
    prompt('아래 링크를 복사하세요', url);
  }
}

function shareTwitter() {
  const url = encodeURIComponent(location.href);
  const text = encodeURIComponent(buildShareText());
  window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank', 'noopener');
}

// Hide native share button on desktop where it's not supported
if (!navigator.share) {
  // keep button visible but it'll fall back to copy
}

shuffleAndRender();
