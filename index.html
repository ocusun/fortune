<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 운세 • 달빛 다이어리</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <div class="container" id="main">
    <!-- 입력 화면 -->
    <div id="input-screen">
      <div class="header">
        <h1>🌙 오늘의 운세</h1>
        <p class="subtitle">나만의 달빛 다이어리</p>
      </div>

      <div class="card input-card">
        <div class="form-group">
          <label>이름 / 별명</label>
          <input type="text" id="name" placeholder="예: 지수, 달빛요정" maxlength="12">
        </div>

        <div class="form-group">
          <label>생년월일</label>
          <input type="date" id="birthdate">
        </div>

        <div class="form-group">
          <label>오늘의 기분</label>
          <div class="mood-buttons" id="mood-buttons">
            <!-- JS에서 생성 -->
          </div>
        </div>

        <button class="btn primary" id="generate-btn">오늘의 운세 보기 ✨</button>
      </div>

      <div class="footer">
        <small>광고 없음 • 개인정보 저장 안 함 • 재미로 즐겨주세요</small>
      </div>
    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="hidden">
      <div class="result-header">
        <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i></button>
        <h2 id="result-title"></h2>
      </div>

      <div class="fortune-card" id="fortune-card">
        <div class="total-score">
          <div class="score-circle" id="total-score">88</div>
          <p>오늘의 총운</p>
        </div>

        <div class="fortune-content" id="fortune-content">
          <!-- JS에서 동적으로 채움 -->
        </div>
      </div>

      <div class="actions">
        <button class="btn secondary" id="copy-btn">
          <i class="fas fa-copy"></i> 텍스트로 복사
        </button>
        <button class="btn primary" id="share-btn">
          <i class="fas fa-share-alt"></i> 공유하기
        </button>
        <button class="btn secondary" id="again-btn">다시 뽑기</button>
      </div>
    </div>
  </div>

  <script src="fortunes.js"></script>
  <script src="app.js"></script>
</body>
</html>
