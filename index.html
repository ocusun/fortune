<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 나 — 8가지 결로 보는 하루</title>
<meta name="description" content="그날의 위인과 명언, 그리고 10가지 질문으로 만나는 오늘의 결.">

<meta property="og:type" content="website">
<meta property="og:title" content="오늘의 나 — 8가지 결로 보는 하루">
<meta property="og:description" content="그날의 위인과 명언, 그리고 10가지 질문으로 만나는 오늘의 결.">
<meta property="og:image" content="https://ocusun.github.io/fortune/today-og.png">
<meta property="og:url" content="https://ocusun.github.io/fortune/today/">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F1E6;
    --bg-card: #FFFEF9;
    --ink: #2C2A24;
    --ink-soft: #6B655C;
    --ink-faint: #A39E94;
    --line: #E5DFD0;
    --gold: #B8860B;
    --seal: #B23A48;
    --accent: #5A6D8A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  .page { max-width: 720px; margin: 0 auto; padding: 48px 24px 64px; }

  /* === Header === */
  .header { text-align: center; margin-bottom: 36px; }
  .title-mini {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px; color: var(--ink-faint);
    letter-spacing: 0.25em; margin-bottom: 6px;
  }
  .title {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px; font-weight: 500;
    letter-spacing: 0.1em; margin-bottom: 10px;
  }
  .title-mark {
    display: inline-block; width: 28px; height: 1px;
    background: var(--ink-faint); margin: 0 12px; vertical-align: middle;
  }
  .date {
    font-size: 14px; color: var(--ink-soft); letter-spacing: 0.05em;
  }

  /* === Daily Quote Card (top) === */
  .quote-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 36px 28px 30px;
    margin-bottom: 36px;
    position: relative;
  }
  .quote-card::before {
    content: ''; position: absolute; inset: 8px;
    border: 0.5px solid var(--line); border-radius: 2px; pointer-events: none;
  }
  .quote-label {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.3em;
    margin-bottom: 18px;
  }
  .quote-context {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .quote-figure {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    color: var(--ink);
    margin-bottom: 24px;
    letter-spacing: 0.02em;
  }
  .quote-text {
    font-family: 'Noto Serif KR', serif;
    text-align: center;
    font-size: 18px;
    line-height: 1.85;
    color: var(--ink);
    padding: 0 8px;
    position: relative;
  }
  .quote-text::before, .quote-text::after {
    content: '"';
    color: var(--ink-faint);
    font-size: 28px;
    margin: 0 6px;
  }
  .quote-tags {
    text-align: center;
    margin-top: 22px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
  }
  .quote-tags span {
    display: inline-block;
    padding: 2px 10px;
    border: 0.5px solid var(--line);
    border-radius: 999px;
    margin: 0 3px;
  }

  /* === Diagnostic intro === */
  .intro {
    text-align: center;
    margin-bottom: 28px;
  }
  .intro-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    color: var(--ink-soft);
    line-height: 1.85;
    margin-bottom: 4px;
  }
  .intro-sub {
    font-size: 13px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  /* === Start button === */
  .start-wrap { text-align: center; margin-top: 40px; }
  .start-btn {
    display: inline-block;
    padding: 14px 38px;
    background: var(--ink);
    color: var(--bg-card);
    border: none;
    border-radius: 3px;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .start-btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(60, 50, 30, 0.12);
  }
  .start-hint {
    margin-top: 14px;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
  }

  /* === Quiz section === */
  .quiz {
    display: none;
  }
  .quiz.active { display: block; }
  .quiz-progress {
    text-align: center;
    margin-bottom: 24px;
  }
  .quiz-progress-bar {
    width: 100%;
    height: 2px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .quiz-progress-fill {
    height: 100%;
    background: var(--ink-soft);
    transition: width 0.4s ease;
  }
  .quiz-progress-text {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
  }
  .question {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 32px 28px;
    margin-bottom: 18px;
    position: relative;
  }
  .question::before {
    content: ''; position: absolute; inset: 8px;
    border: 0.5px solid var(--line); border-radius: 2px; pointer-events: none;
  }
  .q-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    margin-bottom: 10px;
  }
  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.55;
  }
  .q-hint {
    font-size: 12px;
    color: var(--ink-faint);
    margin-bottom: 22px;
    letter-spacing: 0.02em;
  }
  .q-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .q-options.grid-2 { display: grid; grid-template-columns: 1fr 1fr; }
  .q-options.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); }
  .q-option {
    padding: 12px 16px;
    background: transparent;
    border: 0.5px solid var(--line);
    border-radius: 3px;
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.5;
  }
  .q-option:hover {
    background: rgba(184, 134, 11, 0.05);
    border-color: var(--ink-faint);
  }
  .q-option.selected {
    background: var(--ink);
    color: var(--bg-card);
    border-color: var(--ink);
  }
  .q-multi-hint {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 12px;
    text-align: right;
  }
  .quiz-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 18px;
  }
  .nav-btn {
    padding: 10px 24px;
    background: transparent;
    border: 0.5px solid var(--ink-soft);
    border-radius: 3px;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--ink); color: var(--bg-card); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.primary {
    background: var(--ink);
    color: var(--bg-card);
  }
  .nav-btn.primary:hover { background: var(--accent); }

  /* === Result === */
  .result { display: none; }
  .result.active { display: block; }
  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 40px 28px 28px;
    margin-bottom: 18px;
    position: relative;
  }
  .result-card::before {
    content: ''; position: absolute; inset: 8px;
    border: 0.5px solid var(--line); border-radius: 2px; pointer-events: none;
  }
  .result-label {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.3em;
    margin-bottom: 14px;
  }
  .result-type {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .result-type-hanja {
    text-align: center;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: var(--ink-faint);
    letter-spacing: 0.3em;
    margin-bottom: 24px;
  }
  .result-desc {
    font-family: 'Noto Serif KR', serif;
    text-align: center;
    font-size: 16px;
    line-height: 1.9;
    color: var(--ink);
    margin: 0 12px 24px;
    padding-top: 16px;
    border-top: 0.5px solid var(--line);
  }
  .result-section {
    padding-top: 20px;
    margin-top: 20px;
    border-top: 0.5px solid var(--line);
  }
  .result-section-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    text-align: center;
    margin-bottom: 12px;
  }
  .result-prescription {
    font-family: 'Noto Serif KR', serif;
    text-align: center;
    font-size: 15px;
    line-height: 1.85;
    color: var(--ink-soft);
    padding: 0 12px;
  }
  .result-quote {
    text-align: center;
    margin-top: 8px;
  }
  .result-quote-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    line-height: 1.85;
    color: var(--ink);
    margin-bottom: 12px;
    padding: 0 8px;
  }
  .result-quote-text::before, .result-quote-text::after {
    content: '"';
    color: var(--ink-faint);
    font-size: 22px;
    margin: 0 4px;
  }
  .result-quote-attr {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  .actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    background: transparent;
    border: 0.5px solid var(--ink-soft);
    border-radius: 3px;
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--ink); color: var(--bg-card); }

  .footer {
    text-align: center;
    margin-top: 44px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
  }

  /* === Toast === */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--ink);
    color: var(--bg-card);
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 540px) {
    .page { padding: 32px 16px 48px; }
    .title { font-size: 24px; }
    .quote-card { padding: 28px 18px 22px; }
    .quote-text { font-size: 16px; }
    .question { padding: 24px 18px; }
    .q-text { font-size: 16px; }
    .q-options.grid-3 { grid-template-columns: 1fr 1fr; }
    .result-card { padding: 30px 18px 22px; }
    .result-type { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="toast" id="toast">알림</div>

<div class="page">
  <!-- Section 1: 메인 (위인 + 명언 + 진단 시작) -->
  <div id="main-section">
    <div class="header">
      <div class="title-mini">— TODAY ME —</div>
      <h1 class="title">오늘의 나</h1>
      <div class="date" id="date"></div>
    </div>

    <div class="quote-card">
      <div class="quote-label">오 늘 의 한 마 디</div>
      <div class="quote-context" id="quoteContext">—</div>
      <div class="quote-figure" id="quoteFigure">—</div>
      <div class="quote-text" id="quoteText">—</div>
      <div class="quote-tags" id="quoteTags"></div>
    </div>

    <div class="intro">
      <div class="intro-text">10가지 질문으로<br>오늘의 나의 결을 만나보세요</div>
      <div class="intro-sub">3분 정도 소요됩니다</div>
    </div>

    <div class="start-wrap">
      <button class="start-btn" onclick="startQuiz()">진 단 시 작</button>
      <div class="start-hint">8가지 결 중 오늘의 당신은</div>
    </div>
  </div>

  <!-- Section 2: 진단 -->
  <div class="quiz" id="quiz-section">
    <div class="quiz-progress">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill"></div>
      </div>
      <div class="quiz-progress-text" id="progressText">1 / 10</div>
    </div>
    <div class="question" id="questionBox">
      <!-- Filled by JS -->
    </div>
    <div class="quiz-nav">
      <button class="nav-btn" id="prevBtn" onclick="prevQuestion()">이전</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextQuestion()">다음</button>
    </div>
  </div>

  <!-- Section 3: 결과 -->
  <div class="result" id="result-section">
    <div class="result-card">
      <div class="result-label">오 늘 의 결</div>
      <div class="result-type" id="resultType">—</div>
      <div class="result-type-hanja" id="resultTypeHanja">—</div>
      <div class="result-desc" id="resultDesc">—</div>

      <div class="result-section">
        <div class="result-section-label">오 늘 의 처 방</div>
        <div class="result-prescription" id="resultPrescription">—</div>
      </div>

      <div class="result-section">
        <div class="result-section-label">오 늘 의 한 마 디</div>
        <div class="result-quote">
          <div class="result-quote-text" id="resultQuoteText">—</div>
          <div class="result-quote-attr" id="resultQuoteAttr">—</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" onclick="restart()">처음으로</button>
        <button class="btn" onclick="copyResult()">결과 복사</button>
      </div>
    </div>
  </div>

  <div class="footer">深湖 · 流江 · 烈火 · 風野 · 盤石 · 黎明 · 秋熟 · 春芽</div>
</div>

<script>
// =================== 데이터 ===================
const QUOTES_DB = {
  "5-1":  { figure: "근로자의 날", country: "한국", context: "노동의 가치를 기리는 날", quote: "땀 흘려 일하는 손이 가장 아름답다.", tags: ["노동","성실","일상"] },
  "5-2":  { figure: "레오나르도 다 빈치", country: "이탈리아", context: "1519년 별세", quote: "경험은 결코 잘못되지 않는다. 잘못된 것은 우리의 판단이다.", tags: ["관조","성숙","직관"] },
  "5-3":  { figure: "마키아벨리", country: "이탈리아", context: "1469년 출생", quote: "운명은 우리 행동의 절반을 지배할 뿐, 나머지 절반은 우리 손에 남겨둔다.", tags: ["주체성","행동","선택"] },
  "5-4":  { figure: "혜강 최한기", country: "한국", context: "조선 후기 실학자", quote: "배움이 멈추는 곳에서 사람도 멈춘다.", tags: ["배움","성장","탐구"] },
  "5-5":  { figure: "방정환 — 어린이날", country: "한국", context: "1923년 어린이날 제정", quote: "어린이를 내려다보지 마시고 쳐다보아 주시오.", tags: ["존중","순수","성장"] },
  "5-6":  { figure: "지그문트 프로이트", country: "오스트리아", context: "1856년 출생", quote: "꿈은 무의식에 이르는 왕도이다.", tags: ["내면","탐구","직관"] },
  "5-7":  { figure: "표트르 차이콥스키", country: "러시아", context: "1840년 출생", quote: "영감은 게으른 자를 찾아오지 않는다.", tags: ["꾸준함","창조","노력"] },
  "5-8":  { figure: "어버이날", country: "한국", context: "부모님께 감사하는 날", quote: "부모는 자식의 첫 하늘이고, 자식은 부모의 마지막 노을이다.", tags: ["가족","감사","관계"] },
  "5-9":  { figure: "프리드리히 실러", country: "독일", context: "1805년 별세", quote: "진정으로 아름다운 것은 자유로운 것이다.", tags: ["자유","아름다움","본질"] },
  "5-10": { figure: "이순신 장군", country: "한국", context: "임진왜란의 영웅", quote: "죽고자 하면 살 것이요, 살고자 하면 죽을 것이다.", tags: ["용기","결단","위기"] },
  "5-11": { figure: "리하르트 파인만", country: "미국", context: "1918년 출생", quote: "스스로를 속이지 말라. 당신이야말로 가장 속기 쉬운 사람이다.", tags: ["정직","성찰","탐구"] },
  "5-12": { figure: "플로렌스 나이팅게일", country: "영국", context: "1820년 출생, 국제 간호사의 날", quote: "내가 성공한 것은 단 한 번도 변명하지 않았기 때문이다.", tags: ["헌신","책임","성실"] },
  "5-13": { figure: "한용운", country: "한국", context: "독립운동가·시인", quote: "님은 갔습니다. 그러나 나는 님을 보내지 아니하였습니다.", tags: ["기다림","사랑","성숙"] },
  "5-14": { figure: "스승의 가르침을 기리며", country: "한국", context: "스승의 날 무렵", quote: "가르치는 자는 영원히 배우는 자이다.", tags: ["배움","겸손","성장"] },
  "5-15": { figure: "세종대왕", country: "한국", context: "1397년 탄생일, 스승의 날", quote: "백성을 가르치는 바른 소리. 모든 사람이 쉽게 익혀 날마다 쓰기에 편하게 하고자 함이라.", tags: ["애민","지혜","창조"] },

// =================== 상태 ===================
let currentQuestion = 0;
let answers = {};  // { Q1: index_or_indices, ... }
let resultType = null;

// =================== 초기화 ===================
const days = ['일','월','화','수','목','금','토'];
const today = new Date();
const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 ${days[today.getDay()]}요일`;
document.getElementById('date').textContent = dateStr;

const todayKey = `${today.getMonth()+1}-${today.getDate()}`;
const todayQuote = QUOTES_DB[todayKey] || {
  figure: "오늘의 한마디",
  country: "",
  context: "잠시 마음을 가다듬는 시간",
  quote: "오늘 하루도 평안하시기를.",
  tags: ["일상","평안"]
};
document.getElementById('quoteContext').textContent = `${todayQuote.country ? todayQuote.country + ' · ' : ''}${todayQuote.context}`;
document.getElementById('quoteFigure').textContent = todayQuote.figure;
document.getElementById('quoteText').textContent = todayQuote.quote;
document.getElementById('quoteTags').innerHTML = todayQuote.tags.map(t => `<span>${t}</span>`).join('');

// =================== 진단 진행 ===================
function startQuiz() {
  document.getElementById('main-section').style.display = 'none';
  document.getElementById('quiz-section').classList.add('active');
  currentQuestion = 0;
  answers = {};
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestion() {
  const q = QUESTIONS[currentQuestion];
  const fillPct = ((currentQuestion + 1) / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = fillPct + '%';
  document.getElementById('progressText').textContent = `${currentQuestion + 1} / ${QUESTIONS.length}`;

  const layoutClass = q.layout === 'grid-2' ? 'grid-2' : (q.layout === 'grid-3' ? 'grid-3' : '');
  const selected = answers[q.id];
  const selectedSet = q.type === 'multi' ? new Set(selected || []) : null;

  let html = `
    <div class="q-num">Q${currentQuestion + 1}</div>
    <div class="q-text">${q.text}</div>
    <div class="q-hint">${q.hint}</div>
    <div class="q-options ${layoutClass}">
  `;
  q.options.forEach((opt, idx) => {
    const isSelected = q.type === 'multi'
      ? selectedSet.has(idx)
      : selected === idx;
    html += `<button class="q-option ${isSelected ? 'selected' : ''}" onclick="selectOption(${idx})">${opt.label}</button>`;
  });
  html += `</div>`;
  if (q.type === 'multi') {
    html += `<div class="q-multi-hint">복수 선택 가능 · 선택 안 해도 다음으로 진행 가능</div>`;
  }
  document.getElementById('questionBox').innerHTML = html;

  document.getElementById('prevBtn').disabled = currentQuestion === 0;
  document.getElementById('nextBtn').textContent =
    currentQuestion === QUESTIONS.length - 1 ? '결과 보기' : '다음';
}

function selectOption(idx) {
  const q = QUESTIONS[currentQuestion];
  if (q.type === 'multi') {
    let arr = answers[q.id] || [];
    if (arr.includes(idx)) arr = arr.filter(i => i !== idx);
    else arr = [...arr, idx];
    answers[q.id] = arr;
  } else {
    answers[q.id] = idx;
  }
  renderQuestion();
}

function nextQuestion() {
  const q = QUESTIONS[currentQuestion];
  // single 문항은 답을 안 골랐으면 진행 불가
  if (q.type === 'single' && answers[q.id] === undefined) {
    showToast('한 가지를 선택해주세요');
    return;
  }
  if (currentQuestion < QUESTIONS.length - 1) {
    currentQuestion++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    finishQuiz();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// =================== 점수 계산 ===================
function calculateType() {
  const scores = { depho: 0, yugang: 0, yulhwa: 0, pungya: 0, banseok: 0, lyeong: 0, chusuk: 0, chuna: 0 };
  QUESTIONS.forEach(q => {
    const ans = answers[q.id];
    if (ans === undefined || ans === null) return;
    if (q.type === 'multi') {
      ans.forEach(idx => {
        const opt = q.options[idx];
        Object.entries(opt.scores).forEach(([key, val]) => { scores[key] += val; });
      });
    } else {
      const opt = q.options[ans];
      Object.entries(opt.scores).forEach(([key, val]) => { scores[key] += val; });
    }
  });
  let topType = null, topScore = -1;
  Object.entries(scores).forEach(([key, val]) => {
    if (val > topScore) { topScore = val; topType = key; }
  });
  return topType;
}

// 답변을 시드로 변환 → 처방 풀에서 결정론적으로 선택
function answersToSeed() {
  let seed = 0;
  QUESTIONS.forEach((q, qi) => {
    const ans = answers[q.id];
    if (ans === undefined) return;
    if (q.type === 'multi') {
      ans.forEach(idx => { seed += (qi + 1) * 17 + idx * 31; });
    } else {
      seed += (qi + 1) * 17 + ans * 31;
    }
  });
  // 날짜도 시드에 포함 → 같은 응답이라도 날짜별로 처방이 다르게
  seed += today.getMonth() * 100 + today.getDate();
  return seed;
}

function pickPrescription(typeKey) {
  const pool = PRESCRIPTIONS[typeKey];
  const seed = answersToSeed();
  return pool[seed % pool.length];
}

// =================== 결과 표시 ===================
function finishQuiz() {
  // 점수와 응답을 콘솔에 출력 (디버그용)
  const debugScores = { depho: 0, yugang: 0, yulhwa: 0, pungya: 0, banseok: 0, lyeong: 0, chusuk: 0, chuna: 0 };
  QUESTIONS.forEach(q => {
    const ans = answers[q.id];
    if (ans === undefined || ans === null) return;
    if (q.type === 'multi') {
      ans.forEach(idx => Object.entries(q.options[idx].scores).forEach(([k,v]) => { debugScores[k] += v; }));
    } else {
      Object.entries(q.options[ans].scores).forEach(([k,v]) => { debugScores[k] += v; });
    }
  });
  console.log('[오늘의 나] 응답:', answers);
  console.log('[오늘의 나] 점수:', debugScores);

  resultType = calculateType();
  console.log('[오늘의 나] 선택된 유형:', resultType, TYPES[resultType].name);

  const t = TYPES[resultType];
  // 메인·진단 섹션 모두 확실히 숨기고 결과만 보이기
  document.getElementById('main-section').style.display = 'none';
  document.getElementById('quiz-section').classList.remove('active');
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-section').classList.add('active');
  document.getElementById('result-section').style.display = 'block';

  document.getElementById('resultType').textContent = t.name;
  document.getElementById('resultTypeHanja').textContent = t.hanja;
  document.getElementById('resultDesc').innerHTML = t.desc.replace(/\n/g, '<br>');

  document.getElementById('resultPrescription').textContent = pickPrescription(resultType);

  document.getElementById('resultQuoteText').textContent = todayQuote.quote;
  document.getElementById('resultQuoteAttr').textContent = `— ${todayQuote.figure}`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  document.getElementById('result-section').classList.remove('active');
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = '';
  document.getElementById('main-section').style.display = '';
  currentQuestion = 0;
  answers = {};
  resultType = null;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =================== 공유 ===================
function getShareUrl() {
  if (window.self !== window.top && document.referrer) return document.referrer;
  return location.href;
}

async function copyResult() {
  if (!resultType) return;
  const t = TYPES[resultType];
  const presc = document.getElementById('resultPrescription').textContent;
  const text = `오늘의 나 — ${t.name} (${t.hanja})\n${presc}\n\n${dateStr} · ${todayQuote.figure}\n"${todayQuote.quote}"\n\n${getShareUrl()}`;
  let ok = false;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(text); ok = true; } catch(e) {}
  }
  if (!ok) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      ok = document.execCommand('copy');
      document.body.removeChild(ta);
    } catch(e) {}
  }
  if (ok) showToast('결과가 복사되었습니다');
  else prompt('아래 내용을 복사하세요', text);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
